name: Auto Comment on PR

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write
  contents: read

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Adicionar comentário com template
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          # Criar arquivo temporário com a mensagem
          cat > /tmp/pr_comment.md << 'EOF'
          ## 📋 Template de Descrição
          
          Por favor, preencha a descrição do PR usando o template abaixo. Copie, preencha e substitua este comentário:
          
          ---
          
          ## Descrição
          
          <!-- Descreva brevemente o que este PR faz e por que. -->
          
          ## Tipo de Mudança
          
          - [ ] Bug fix
          - [ ] Nova feature
          - [ ] UI/UX
          - [ ] Performance
          - [ ] Refactor
          - [ ] Security
          - [ ] Docs
          - [ ] Tests
          - [ ] DevOps
          
          ## Task
          
          MOSK-XXXX
          
          ## Checklist
          
          - [ ] Testes passando (`pnpm test`)
          - [ ] Build sem erros (`pnpm build`)
          - [ ] Lint passando (`pnpm lint`)
          - [ ] Sem credenciais expostas
          - [ ] README atualizado (se necessário)
          
          ---
          
          *CRMed - Hospital São Rafael*
          EOF
          
          # Enviar comentário
          gh pr comment "$PR_URL" --body-file /tmp/pr_comment.md
