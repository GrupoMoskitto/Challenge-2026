name: Security Analysis

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: TruffleHog Secrets Scanner
        uses: trufflesecurity/trufflehog@main
        with:
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  dependency-check:
    name: Dependency Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=moderate

      - name: Check for known vulnerabilities
        run: pnpm audit --audit-level=high || true

  code-quality-security:
    name: Code Quality (Security Focus)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint Security Rules
        run: pnpm lint || true

      - name: TypeScript Check
        run: pnpm --filter @crmed/api build

  security-checklist:
    name: Security Checklist Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify no hardcoded secrets
        run: |
          echo "Verificando segudos expostos..."
          
          # Check for common secret patterns
          if git diff --name-only HEAD~1 | xargs grep -l "password\s*=\s*['\"][^'\"]{8,}['\"]" 2>/dev/null; then
            echo "⚠️  Possível segredo encontrado!"
            exit 1
          fi
          
          echo "✓ Nenhum segredo hardcoded detectado"
