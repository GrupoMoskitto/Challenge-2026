name: PR Checklist

on:
  pull_request:
    types: [opened]

jobs:
  checklist:
    name: Add Checklist Comment
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Post PR Checklist
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;

            const body = [
              `## Review Checklist`,
              '',
              `Branch: \`${branch}\``,
              '',
              '**Padrões**',
              '- [ ] Branch no formato `MOSK-0000/tipo/tarefa`',
              '- [ ] Commits seguem Conventional Commits',
              '- [ ] TypeScript strict, sem `any` injustificado',
              '',
              '**Qualidade**',
              '- [ ] Testes passando — `pnpm test`',
              '- [ ] Build sem erros — `pnpm build`',
              '- [ ] Sem credenciais ou secrets expostos',
              '',
              '**Regras de Negócio**',
              '- [ ] RN01 — Unicidade de CPF, e-mail e telefone',
              '- [ ] RN03 — Hierarquia de roles',
              '- [ ] RN05 — Ciclo de notificações WhatsApp',
              '- [ ] RN06 — Auditoria em alterações de status',
              '',
              '**Documentação**',
              '- [ ] README atualizado, se necessário',
              '- [ ] Prisma schema atualizado com `db:setup`, se alterado',
              '',
              '> Marque apenas os itens aplicáveis a este PR.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
