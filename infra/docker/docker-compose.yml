services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: crmed
      POSTGRES_PASSWORD: crmed123
      POSTGRES_DB: crmed
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Init script to create a secondary database since POSTGRES_DB only creates one
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crmed"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  evolution-api:
    image: evoapicloud/evolution-api:homolog
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: http://localhost:8080
      SERVER_PORT: 8080
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ***REMOVED***
      DEL_INSTANCE: "false"
      QRCODE_LIMIT: 30
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://crmed:crmed123@postgres:5432/evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379
      CACHE_REDIS_PREFIX_KEY: evo
      CACHE_REDIS_SAVE_INSTANCES: "false"
      CONFIG_SESSION_PHONE_CLIENT: Evolution API
      CONFIG_SESSION_PHONE_NAME: Chrome
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: http://host.docker.internal:3002/webhook/evolution
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      LOG_LEVEL: ERROR,WARN
      LOG_COLOR: "true"
      LOG_BAILEYS: error
    logging:
      driver: "none"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    build:
      context: ../../
      dockerfile: infra/docker/api.Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://crmed:crmed123@postgres:5432/crmed
      REDIS_URL: redis://redis:6379
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ***REMOVED***
      DEV_ALLOWED_PHONE: ${DEV_ALLOWED_PHONE:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  workers:
    build:
      context: ../../
      dockerfile: infra/docker/workers.Dockerfile
    environment:
      DATABASE_URL: postgresql://crmed:crmed123@postgres:5432/crmed
      REDIS_URL: redis://redis:6379
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ***REMOVED***
      DEV_ALLOWED_PHONE: ${DEV_ALLOWED_PHONE:-}
      EVOLUTION_INSTANCE_NAME: ${EVOLUTION_INSTANCE_NAME:-crmed-whatsapp}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      evolution-api:
        condition: service_started

  web:
    build:
      context: ../../
      dockerfile: infra/docker/web.Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - api

volumes:
  postgres_data:
