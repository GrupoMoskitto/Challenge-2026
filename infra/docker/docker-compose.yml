version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: crmed
      POSTGRES_PASSWORD: crmed123
      POSTGRES_DB: crmed
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Init script to create a secondary database since POSTGRES_DB only creates one
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crmed"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3.0
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,ses,lambda
      DEBUG: 1
      DEFAULT_REGION: us-east-1
    volumes:
      - "./localstack/init.sh:/etc/localstack/init/ready.d/init.sh"
      - localstack_data:/var/lib/localstack
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5


  api:
    build:
      context: ../../
      dockerfile: infra/docker/api.Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://crmed:crmed123@postgres:5432/crmed
      REDIS_URL: redis://redis:6379
      LOCALSTACK_URL: http://localstack:4566
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy

  workers:
    build:
      context: ../../
      dockerfile: infra/docker/workers.Dockerfile
    environment:
      DATABASE_URL: postgresql://crmed:crmed123@postgres:5432/crmed
      REDIS_URL: redis://redis:6379
      LOCALSTACK_URL: http://localstack:4566
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-http://localhost:8080}
      EVOLUTION_API_KEY: ***REMOVED***
      DEV_ALLOWED_PHONE: ${DEV_ALLOWED_PHONE:-}
      EVOLUTION_INSTANCE_NAME: ${EVOLUTION_INSTANCE_NAME:-crmed-whatsapp}
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: "http://workers:3002/webhook/evolution"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy

  web:
    build:
      context: ../../
      dockerfile: infra/docker/web.Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - api

volumes:
  postgres_data:
  localstack_data:
